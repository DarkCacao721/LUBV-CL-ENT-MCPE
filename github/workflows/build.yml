name: Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build
        run: |
          mkdir -p apk
          cd apk
          wget -O gradle.zip https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip gradle.zip
          cd ..
          wget -O sdk.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip sdk.zip
          export ANDROID_HOME=$PWD
          yes | ./cmdline-tools/bin/sdkmanager --licenses
          ./cmdline-tools/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
          apk/gradle-8.4/bin/gradle assembleDebug
      - uses: actions/upload-artifact@v3
        with:
          name: APK
          path: app/build/outputs/apk/debug/*.apk
